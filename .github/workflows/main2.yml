name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4
      - name: Download TFLite model
        run: |
          mkdir -p app/src/main/assets
          curl -L "https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/object_detection/android/lite-model_efficientdet_lite0_detection_metadata_1.tflite" -o app/src/main/assets/efficientdet_lite0.tflite
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: CatGuard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
